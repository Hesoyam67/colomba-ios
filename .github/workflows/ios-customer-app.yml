name: iOS Customer App CI

on:
  push:
    branches: [main, "ci/**", "phase/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      SCHEME: ColombaCustomer

    steps:
      - uses: actions/checkout@v4

      - name: Set Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Toolchain sanity
        run: |
          xcodebuild -version
          fastlane --version
          xcrun simctl list runtimes

      - name: Pre-boot simulator with Swiss locale
        run: |
          set -euo pipefail

          SIM_NAME="ColombaCITestSim"

          SIM_UDID=$(xcrun simctl list devices -j | python3 -c "
          import json, sys
          d = json.load(sys.stdin)['devices']
          for runtime, devs in d.items():
              if 'iOS' not in runtime:
                  continue
              for dev in devs:
                  if dev.get('name') == '$SIM_NAME':
                      print(dev['udid']); sys.exit(0)
          " || true)

          if [ -z "$SIM_UDID" ]; then
            RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
            import json, sys
            rts = [r for r in json.load(sys.stdin)['runtimes'] if r.get('isAvailable') and 'iOS' in r.get('name','')]
            if not rts: sys.exit(1)
            rts.sort(key=lambda r: r['version'], reverse=True)
            print(rts[0]['identifier'])
            ")
            DEVICE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro"
            SIM_UDID=$(xcrun simctl create "$SIM_NAME" "$DEVICE_TYPE" "$RUNTIME")
            echo "Created simulator $SIM_NAME ($SIM_UDID)"
          else
            echo "Reusing simulator $SIM_NAME ($SIM_UDID)"
          fi

          xcrun simctl shutdown "$SIM_UDID" 2>/dev/null || true
          xcrun simctl erase "$SIM_UDID"

          xcrun simctl boot "$SIM_UDID"
          xcrun simctl bootstatus "$SIM_UDID" -b

          xcrun simctl spawn "$SIM_UDID" defaults write -g AppleLocale -string de_CH
          xcrun simctl spawn "$SIM_UDID" defaults write -g AppleLanguages -array de-CH

          echo "AppleLocale: $(xcrun simctl spawn $SIM_UDID defaults read -g AppleLocale 2>/dev/null || echo unset)"
          echo "AppleLanguages: $(xcrun simctl spawn $SIM_UDID defaults read -g AppleLanguages 2>/dev/null || echo unset)"

          xcrun simctl shutdown "$SIM_UDID"
          xcrun simctl boot "$SIM_UDID"
          xcrun simctl bootstatus "$SIM_UDID" -b

          echo "SIM_NAME=$SIM_NAME" >> "$GITHUB_ENV"
          echo "SIM_UDID=$SIM_UDID" >> "$GITHUB_ENV"

      - name: Build & test (fastlane scan)
        run: |
          fastlane scan \
            --scheme "$SCHEME" \
            --device "$SIM_NAME" \
            --output_types junit \
            --skip_slack \
            --clean \
            --reset_simulator false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            fastlane/test_output
            ~/Library/Logs/scan
          if-no-files-found: ignore
