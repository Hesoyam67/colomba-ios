name: iOS Customer App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-lint:
    name: Xcode ${{ matrix.xcode }} / iOS 17
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        xcode: ['16']
        destination: ['platform=iOS Simulator,name=iPhone 12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          elif [ -d /Applications/Xcode_16.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          fi
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          xcrun --sdk iphonesimulator --show-sdk-version
          swift --version

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint version

      - name: Swift package tests
        run: |
          set -euo pipefail
          swift test
          for pkg in Packages/* Packages/Features/*; do
            if [ -f "$pkg/Package.swift" ]; then
              echo "== swift test $pkg"
              (cd "$pkg" && swift test)
            fi
          done

      - name: SwiftLint
        run: swiftlint --strict

      - name: Resolve iOS Simulator runtime
        id: ios_runtime
        run: |
          set -euo pipefail
          IOS_VERSION=$(xcrun simctl list runtimes available -j \
            | jq -r '.runtimes[] | select(.platform == "iOS" and .isAvailable == true) | .version' \
            | sort -V \
            | tail -n 1)
          if [ -z "$IOS_VERSION" ]; then
            echo "ERROR: no available iOS Simulator runtime found on this runner" >&2
            xcrun simctl list runtimes >&2
            exit 1
          fi
          echo "Resolved iOS Simulator runtime: $IOS_VERSION"
          echo "IOS_VERSION=$IOS_VERSION" >> "$GITHUB_ENV"

      - name: iOS simulator build + cold-start gate
        run: |
          set -euxo pipefail
          trap 'rc=$?; echo "::error file=ios-customer-app.yml::Step exited rc=$rc at bash LINENO=$LINENO. Last command before exit shown above this line."; exit $rc' ERR
          echo "Using iOS Simulator runtime: ${IOS_VERSION}"
          echo "::group::CHECKPOINT_01 environment"
          echo "IOS_VERSION=${IOS_VERSION:-unset}"
          xcrun simctl list runtimes available | head -20
          echo "::endgroup::"
          xcrun simctl list devices available | grep -E 'iPhone 12|iPhone 15' || true
          python3 - <<'PY'
          from pathlib import Path
          path = Path("scripts/measure-cold-start.sh")
          script = path.read_text()
          old = '  -destination "id=$udid" ' + '\\' + '\n'
          new = '  -destination "platform=iOS Simulator,OS=${IOS_VERSION},name=${DEVICE_NAME}" ' + '\\' + '\n'
          if old not in script:
              raise SystemExit("destination patch target not found")
          path.write_text(script.replace(old, new))
          PY
          echo "::group::CHECKPOINT_02 post-build artifact discovery"
          trap 'rc=$?; echo "::group::CHECKPOINT_02 post-build artifact discovery"; find "${RUNNER_WORKSPACE:-.}" -maxdepth 6 -name "*.app" -type d 2>&1 | head -20 || true; echo "::endgroup::"; echo "::group::CHECKPOINT_03 boot simulator"; xcrun simctl list devices booted 2>&1 || true; echo "::endgroup::"; echo "::error file=ios-customer-app.yml::Step exited rc=$rc at bash LINENO=$LINENO. Last command before exit shown above this line."; exit $rc' ERR
          echo "::group::CHECKPOINT_03 boot simulator"
          RUNTIME_ID="com.apple.CoreSimulator.SimRuntime.iOS-${IOS_VERSION//./-}"
          echo "Looking up iPhone 15 on runtime: $RUNTIME_ID"
          DEVICE_UDID=$(xcrun simctl list devices --json \
            | jq -r --arg rt "$RUNTIME_ID" '
                .devices[$rt] // [] |
                map(select(.name == "iPhone 15" and .isAvailable == true)) |
                first |
                .udid // ""
              ')
          if [ -z "$DEVICE_UDID" ] || [ "$DEVICE_UDID" = "null" ]; then
            echo "::error::No available iPhone 15 device on $RUNTIME_ID"
            echo "--- All available devices for diagnosis ---"
            xcrun simctl list devices --json | jq '.devices | to_entries[] | {runtime: .key, devices: [.value[] | select(.isAvailable == true) | .name]}'
            exit 1
          fi
          echo "Selected device: iPhone 15 ($DEVICE_UDID)"
          xcrun simctl boot "$DEVICE_UDID" || true
          xcrun simctl bootstatus "$DEVICE_UDID" -b
          echo "Simulator booted and ready."
          echo "--- Booted devices verification ---"
          xcrun simctl list devices booted
          echo "::endgroup::"
          DEVICE_NAME="Colomba CI iPhone 15 ${IOS_VERSION}" \
            DEVICE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-15" \
            scripts/measure-cold-start.sh
          find "${RUNNER_WORKSPACE:-.}" -maxdepth 6 -name "*.app" -type d 2>&1 | head -20 || true
          echo "::endgroup::"

      - name: Upload CI step logs (diagnostic)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.workspace }}/**/*.log
            ${{ runner.temp }}/**/*.log
          if-no-files-found: ignore
          retention-days: 7
