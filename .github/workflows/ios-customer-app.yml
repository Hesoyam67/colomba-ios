name: iOS Customer App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-lint:
    name: Xcode ${{ matrix.xcode }} / iOS 18.5
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        xcode: ['16.4']
        destination: ['platform=iOS Simulator,name=iPhone 16,OS=18.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        run: |
          if [ -d "/Applications/Xcode_${{ matrix.xcode }}.app" ]; then
            sudo xcode-select -s "/Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer"
          elif [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version
          swift --version

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint version

      - name: Swift package tests
        run: |
          set -euo pipefail
          swift test
          for pkg in Packages/* Packages/Features/*; do
            if [ -f "$pkg/Package.swift" ]; then
              echo "== swift test $pkg"
              (cd "$pkg" && swift test)
            fi
          done

      - name: SwiftLint
        run: swiftlint --strict

      - name: iOS simulator build + cold-start gate
        continue-on-error: true # TEMP non-blocking until Xcode/runtime cold-start baseline is reaccepted; see state/COLD-START-NONBLOCKING-FOLLOWUP-2026-05-04.md
        env:
          DEVICE_NAME: iPhone 16
          DEVICE_TYPE: com.apple.CoreSimulator.SimDeviceType.iPhone-16
        run: |
          xcrun simctl list devices available | grep -E 'iPhone 16|iPhone 16 Pro|iPhone 16 Pro Max|iPhone 16e|iPhone SE' || true
          scripts/measure-cold-start.sh
