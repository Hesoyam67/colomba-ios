strict: true

included:
  - ColombaCustomer
  - Packages
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData
  - build
  - Packages/**/.build

opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_in_static_references
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

analyzer_rules:
  - unused_import

force_cast: error
force_try: error
implicitly_unwrapped_optional:
  severity: error
force_unwrapping:
  severity: warning
line_length:
  warning: 120
  error: 160
  ignores_urls: true
  ignores_comments: true
type_body_length:
  warning: 300
  error: 450
file_length:
  warning: 500
  error: 800
function_body_length:
  warning: 60
  error: 100
identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - ms
