name: ColombaCustomer
options:
  minimumXcodeGenVersion: 2.43.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  PhoneNumberKit:
    url: https://github.com/marmelroy/PhoneNumberKit.git
    from: 4.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0
  ColombaCore:
    path: Packages/ColombaCore
  ColombaDesign:
    path: Packages/ColombaDesign
  ColombaNetworking:
    path: Packages/ColombaNetworking
  ColombaAuth:
    path: Packages/ColombaAuth
  ColombaBilling:
    path: Packages/ColombaBilling
  PlanFeature:
    path: Packages/Features/PlanFeature
  UsageFeature:
    path: Packages/Features/UsageFeature
  UpgradeFeature:
    path: Packages/Features/UpgradeFeature
  TopUpFeature:
    path: Packages/Features/TopUpFeature
  ScheduledChangeFeature:
    path: Packages/Features/ScheduledChangeFeature
  InvoicesFeature:
    path: Packages/Features/InvoicesFeature
  AccountFeature:
    path: Packages/Features/AccountFeature
targets:
  ColombaCustomer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ColombaCustomer
        excludes:
          - Tests
    resources:
      - path: ColombaCustomer/Assets.xcassets
      - path: ColombaCustomer/PrivacyInfo.xcprivacy
    info:
      path: ColombaCustomer/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: Colomba Google OAuth Production
            CFBundleURLSchemes:
              - com.googleusercontent.apps.603668283017-gp0r3ks2980c3jrktdjvjeptbe0usa5a
          - CFBundleTypeRole: Editor
            CFBundleURLName: Colomba Google OAuth Local Dev
            CFBundleURLSchemes:
              - com.googleusercontent.apps.603668283017-ue8n490uq608gp9sfa9v89674uahf230
        ColombaGoogleOAuthLocalDevClientID: 603668283017-ue8n490uq608gp9sfa9v89674uahf230.apps.googleusercontent.com
        ColombaGoogleOAuthProductionClientID: 603668283017-gp0r3ks2980c3jrktdjvjeptbe0usa5a.apps.googleusercontent.com
        ColombaReservationWebhookBaseURL: https://api.colomba-swiss.ch/webhook
        NSCalendarsFullAccessUsageDescription: Colomba uses calendar access only when you choose to add a reservation to your calendar.
        NSCalendarsUsageDescription: Colomba uses calendar access only when you choose to add a reservation to your calendar.
        UILaunchScreen: {}
        UIRequiresFullScreen: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.colomba.customer
        PRODUCT_NAME: ColombaCustomer
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: NO
        ENABLE_DEBUG_DYLIB: NO
        CODE_SIGN_ENTITLEMENTS: ColombaCustomer/ColombaCustomer.entitlements
    dependencies:
      - package: ColombaCore
      - package: ColombaDesign
      - package: ColombaAuth
      - package: ColombaNetworking
      - package: ColombaBilling
      - package: PhoneNumberKit
      - package: GoogleSignIn
  ColombaCustomerTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: ColombaCustomer/Tests
      - path: ColombaCustomerTests
    dependencies:
      - target: ColombaCustomer
      - package: ColombaNetworking
      - package: ColombaBilling
      - package: PhoneNumberKit
schemes:
  ColombaCustomer:
    build:
      targets:
        ColombaCustomer: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ColombaCustomerTests
