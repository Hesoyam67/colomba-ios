name: ColombaCustomer
options:
  minimumXcodeGenVersion: 2.43.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  ColombaCore:
    path: Packages/ColombaCore
  ColombaDesign:
    path: Packages/ColombaDesign
  ColombaNetworking:
    path: Packages/ColombaNetworking
  ColombaAuth:
    path: Packages/ColombaAuth
  ColombaBilling:
    path: Packages/ColombaBilling
  PlanFeature:
    path: Packages/Features/PlanFeature
  UsageFeature:
    path: Packages/Features/UsageFeature
  UpgradeFeature:
    path: Packages/Features/UpgradeFeature
  TopUpFeature:
    path: Packages/Features/TopUpFeature
  ScheduledChangeFeature:
    path: Packages/Features/ScheduledChangeFeature
  InvoicesFeature:
    path: Packages/Features/InvoicesFeature
  AccountFeature:
    path: Packages/Features/AccountFeature
targets:
  ColombaCustomer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ColombaCustomer
        excludes:
          - Tests
    resources:
      - path: ColombaCustomer/Assets.xcassets
      - path: ColombaCustomer/PrivacyInfo.xcprivacy
    info:
      path: ColombaCustomer/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.colomba.customer
        PRODUCT_NAME: ColombaCustomer
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: NO
        ENABLE_DEBUG_DYLIB: NO
        CODE_SIGN_ENTITLEMENTS: ColombaCustomer/ColombaCustomer.entitlements
    dependencies:
      - package: ColombaCore
      - package: ColombaDesign
      - package: ColombaAuth
      - package: ColombaNetworking
      - package: ColombaBilling
  ColombaCustomerTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: ColombaCustomer/Tests
    dependencies:
      - target: ColombaCustomer
      - package: ColombaNetworking
      - package: ColombaBilling
schemes:
  ColombaCustomer:
    build:
      targets:
        ColombaCustomer: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ColombaCustomerTests
